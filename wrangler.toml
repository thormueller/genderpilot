name = "genderpilot"
main = "src/worker.py"
compatibility_date = "2026-05-21"
compatibility_flags = ["python_workers", "python_dedicated_snapshot"]

[vars]
OPENAI_MODEL = "gpt-5.4-mini"

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[observability]
enabled = true
